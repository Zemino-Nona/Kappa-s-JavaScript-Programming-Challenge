<!DOCTYPE html>
<html lang="en">
<head>
    <title>Simple Chess Game: Gomoku</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /*setup website details*/
        body {
            background-color: black; /*the colour of background is black*/
            color: white; /*colour as white*/
            text-align: center;/*text of css will align in centre*/
            font-family: Arial, sans-serif;/*font setup*/
        }
        /*canva setup*/
        canvas {
            border: 1px solid white;
            display: block;
            margin: 20px auto;
            background-color: #222;
        }
        p {
            text-align:center;
            font-family:'Arial';
            font-size: small;
            font-style: oblique;
            font-weight: bold;
        }
        h1{
            text-align:center;
            font-family:'Arial';
            font-size: larger;
            font-style: oblique;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Connect-5 Chess Game</h1>
    <canvas id="canvas" width="800" height="800" tabindex="1"></canvas>
    
    <script>
        /*
        Author: Kerr Zhang
        Finished in: 2026-06-01
        ICS3U, Peroid-4, CCVI
        
        A connect-five game， or called "Gomoku" User needs to connect five chess in a row, vertical, horzontal, or just a line to win the game.
        
        Press left-mouse to place down the chess, the colour of circle at mouse would tell which colour will be place next.
        After one party got win, press key “R” to reset.

        Other Info:
        The game main code was programmed in P5.Js, then use self-made functions to achieve the same function as the code wants.
        If player(s) wants to play more smoothly, I suggest using two mouse at same time (each player holding one mouse for control)
        My skill is not as good yet for build server, host and online battle mode yet (Ｔ▽Ｔ)
        Anyways, enjoy!
        */
        
        // ==========================================
        // CODE COMPATIBILITY LAYER 
        // ==========================================
        
        //define variables 
        var canvas, ctx;
        
        var width, height;
        var mouseX = 0, mouseY = 0;
        
        var mouseIsPressed = false;
        var keyCode = 0;
        var keyIsPressed = false;
        var key = '';
        
        
        var ENTER = 13;
        var SHIFT = 16;
        var CENTER = 'center'; 

        var isStroke = true; 
        
        
        /**
         * Setup each functions and variables e.g canvas' setup
         * @returns {void}
         */
        function init() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            width = canvas.width;
            height = canvas.height;
            
            if (window.setup) { 
                setup(); 
            }
            startLoop();
        }
        
        
        /**
         * Create canvas by width and height
         * @param {int} w width of canva that will be assing to display
         * @param {int} h height of canva that will be assing to display
         * @returns {undefined}
         */
        function createCanvas(w, h) {
            canvas.width = w;//define width of canva
            canvas.height = h;//define height of canva
            width = w;//repersent width to global var "width"
            height = h;//repersent height to global var "height"
        }
        
        /**
         * resize, or recreate canvas based on height and width
         * @param {type} w
         * @param {type} h
         * @returns {undefined}
         */
        function resizeCanvas(w, h) {
            createCanvas(w, h);//create canvas by w,h agian
        }
        
        /**
         * To fill the shape or line drawn after this function as the RGB colour setted
         * @param {int} r numbers of Red
         * @param {int} g numbers of Green
         * @param {int} b numbers of Blue
         * @param {int} a numbers of transperent 
         * @returns {void}
         */
        function fill(r, g, b, a) {
            if (a === undefined) { // If a, which is the clearness of the following colour is not filled;
                a = 255; // Defult as highest, 255.
            }
            
            if (typeof r === "string") { //If the type of r, red is a string, then the filling;
                ctx.fillStyle = r; 
            } else if (g === undefined) {
                ctx.fillStyle = "rgb(" + r + "," + r + "," + r + ")";// Would defult as a single state, white colour only.
            } else if (b === undefined) {
                ctx.fillStyle = "rgba(" + r + "," + r + "," + r + "," + (g / 255) + ")";// Would defult as a single state, white colour only.
            } else {
                ctx.fillStyle = "rgba(" + r + "," + g + "," + b + "," + (a / 255) + ")";
            }
        }
        
        /**
         * Define the stroke on drawing after this code
         * @param {int} c ,the stroke colour
         * @returns {undefined}
         */
        function stroke(c) {
            isStroke = true;
            if (typeof c === "number") {
                ctx.strokeStyle = "rgb(" + c + "," + c + "," + c + ")";
            } else {
                ctx.strokeStyle = c;
            }
        }
        
        /**
         * Set no stroke for shapes
         */
        function noStroke() {
            isStroke = false;
            ctx.strokeStyle = "transparent";
        }
        
        /**
         * Draws the whole canvas as a rgb colour
         * @param {int} r , red in rgb colour
         * @param {int} g , green in rgb colour
         * @param {int} b , blue in rgb colour
         */
        function background(r, g, b) {
            fill(r, g, b);//fill following colour
            ctx.fillRect(0, 0, width, height);//draw the background
        }
        
        /**
         * @param {type} x the x start position of a rectangle
         * @param {type} y the y start position of a rectangle
         * @param {type} w the width of rectangle
         * @param {type} h the height of rectangle
         */
        function rect(x, y, w, h) {
            ctx.fillRect(x, y, w, h);//draw rectangle
            if (isStroke === true) {//if is stroke,
                ctx.strokeRect(x, y, w, h);//draw rectangle without stroke
            }
        }
        
        /**
         * @param {type} x the coordnate x of centre of circle
         * @param {type} y the coordnate y of centre of circle
         * @param {type} d the diameter of circle
         */
        function circle(x, y, d) {
            ctx.beginPath();//begin to draw
            ctx.arc(x, y, d / 2, 0, Math.PI * 2);//draw a arc as x,y and d
            ctx.fill();//fill the circle
            if (isStroke === true) {
                ctx.stroke();//if is stroke, draw circle with stroke
            }
        }
        
        /**
         * Set the font size of text drawing after this function
         * @param {int} size , the size of text in pixel
         */
        function textSize(size) {
            ctx.font = size + "px Arial";
        }
        
        /**
         * Set the text alignment for canvas text drawing
         * @param {string} align , text alignment style e.g. "center", "left"
         */
        function textAlign(align) {
            if (typeof align === "string") {
                ctx.textAlign = align.toLowerCase();
            } else {
                ctx.textAlign = "center";
            }
        }
        
        
        /**
         * Draw string text onto the canvas, support multiple lines by '\n'
         * @param {string} str , the text string going to display
         * @param {int} x , the coordinate x of text position
         * @param {int} y , the coordinate y of text position
         */
        function text(str, x, y) {
            var textString = String(str);
            var lines = textString.split('\n'); // split text into lines
            
            var fontHeight = parseInt(ctx.font, 10); // get current font size
            var lineHeight = 16; 
            
            if (isNaN(fontHeight) === false) {
                lineHeight = fontHeight * 1.2; // set dynamic line height
            }
            for (var i = 0; i < lines.length; i++) {
                ctx.fillText(lines[i], x, y + (i * lineHeight)); // draw each lines one by one
            }
        }

        // ====================================================
        // EVENT LISTENERS FOR CONTROLS
        // ====================================================

            canvas = document.getElementById("canvas");
    
            //Track mouse position relative to canvas bounds
            canvas.addEventListener("mousemove", function(e) {
                var rectInfo = canvas.getBoundingClientRect();
                mouseX = e.clientX - rectInfo.left;
                mouseY = e.clientY - rectInfo.top;
            });

            //mouse down event
            canvas.addEventListener("mousedown", function() { 
                mouseIsPressed = true; 
            });
    
            //mouse up event and trigger mouseReleased callback
            canvas.addEventListener("mouseup", function() { 
                mouseIsPressed = false; //set mouse pressed as false
                if (window.mouseReleased) { //if mouse released
                    mouseReleased(); //run function
                }
            });
    
            //keydown event and trigger keyPressed callback
            window.addEventListener("keydown", function(e) { 
                keyCode = e.keyCode; //translate "keyCode" as readable variable 
                key = e.key;//translate "key" as readable variable
                keyIsPressed = true;//set key is pressed as true
                if (window.keyPressed) { //if key pressed
                    keyPressed(); //run function
                }
            });
    
            //keyup event and trigger keyReleased callback
            window.addEventListener("keyup", function() { 
                keyCode = 0; 
                key = '';
                keyIsPressed = false;
                if (window.keyReleased) { //If key released
                    keyReleased(); //run function 
                }
            });


        // ========================== MAIN LOOP ============================
        
        /**
         * Start the animation/game loop by using requestAnimationFrame
         * @returns {undefined}
         */
        function startLoop() {
            function loop() {
                if (typeof draw === "function") draw(); // run the draw function repeatedly
                requestAnimationFrame(loop); // request next frame loop
            }
            loop();
        }

        window.onload = init;

//============================================ MAIN GAME ===============from p5.js====================

//init variables for data
let startGame = false;
let d = 15;
 
let initIndex = 1;
let keyOn = true;
let mouseReady = true;

let chessGround = [];

// Pre define size of canvas
let size = [0, 10, 60]; // INITAL, MAX SIZE, SIZE OF BOX
let win = false;
//init more variables for further functions
let blockWidth;
let preChess;
let winner = "NO WINNER!!!";

/**
 * Create playground
 * @returns {undefined}
 */
function createChessGround() {
  chessGround = [];//empety 2D array
  for (let y = size[0]; y < size[1]; y++) {  //create y axis first by size data
    chessGround.push([]);
    for (let x = size[0]; x < size[1]; x++) { //then create x axis by size data
      chessGround[y].push({//in every box, has its local position (to replace large x,y pixel values)
        x: x,//the object "x" is equal to x of the pattern
        y: y,//the object "y" is equal to y of the pattern
        party: null//the object "party" is the repersentation of sides. e.g "white", means in this x,y has a chess of white side
      });
    }
  }
}


/**
 * Setup datas, that will run once for create canvas, etc.
 * @returns {undefined}
 */
function setup() {
  createCanvas(size[1] * size[2], size[1] * size[2]); //create canvas based on the size of two data 
  blockWidth = size[2];//set block width as size data
  preChess = "white";//first chess will be black (black first) since previous chess is assign as white
}
/**
 * Draw the chess by x,y, radius and colour
 * @param {type} x ,the pixel x position of chess
 * @param {type} y ,the pixel y position of chess
 * @param {type} r ,the radius of circle
 * @param {type} c ,the colour of circle
 * @returns {undefined}
 */
function drawChess(x, y, r, c) {
  fill(c);//fill by colour c
  circle(x, y, r);//draw the chess
}

/**
 * the function that search if the chess is connected with other five same party chess.
 * @param {type} x ,the local x position of chess
 * @param {type} y ,the local y position of chess
 * @returns {undefined}
 */
function search(x, y) {
  let party = chessGround[y][x].party; //define current party by the party that's searching
  if (!party) return;//if null(not filled) then end this search
  
  let directions = [//define directions pattern by array
    [1, 0],  // horzontal
    [0, 1],  // vertical
    [1, 1],  // slope line \
    [1, -1]  // slope line /
  ];

    //Search in each different pattern in array "directions"
  for (let i = 0; i < directions.length; i++) {
    let dx = directions[i][0];
    let dy = directions[i][1];
    let count = 1; 

    //forward searching
    let tx = x + dx; //define tx (tempory x) as input x plus dx, from the pattern in "directions"
    let ty = y + dy; //define tx (tempory y) as input y plus dy, from the pattern in "directions"
    
    //while searching in forward, which is the increasing of local x,y 
    while (tx >= 0 && tx < size[1] && ty >= 0 && ty < size[1] && chessGround[ty][tx].party === party) {//in the range, if the party searched (of local x,y) is the same coloured party 
      count++;//then add count by 1
      //to find the other connecting chess;
      tx += dx;//increase tx by dx (which is 1 or 0)
      ty += dy;//increase ty by dy (which is 1 or 0)
    }

    //backward searching
    tx = x - dx;//define tx (tempory x) as input x plus dx, from the pattern in "directions"
    ty = y - dy;//define tx (tempory y) as input y plus dy, from the pattern in "directions"
    while (tx >= 0 && tx < size[1] && ty >= 0 && ty < size[1] && chessGround[ty][tx].party === party) {
        count++;//in the range, if the party searched (of local x,y) is the same coloured party 
        //to find the other connecting chess;
        tx -= dx;//decrease tx by dx (which is 1 or 0)
        ty -= dy;//decrease ty by dy (which is 1 or 0)
    }
    
    //detection logic
    if (count >= 5) {//if count is over 5
      console.log("Winner is: " + party);//winner will become the party that is searched, or the party that connected
      win = true;//other kind of return, but with variable instead
      winner = party;//winner is the party that searched
      return;//end the function
    }
  }
}
/**
 * Draw and show the options that allowed to define for starting title
 */
function startTitle() {
  background(190, 227, 219);//set background as rgb colour  
  noStroke();//init as no stroke
  fill(85, 91, 110);//fill rgb colour for shapes 
  
  //draw the shapes and text
  rect(0, height / 4, width, height - height / 2);
  fill(250, 249, 249);
  textSize(20);
  fill(255, 255, 255);
  textAlign(width/2);
  text("Start the game by pressing 'Enter'", width / 2, height / 3);
  text("Select your inital setup by [up][down], and [space]:", width / 2, height / 2 - 50);
  fill(255, 0, 0);
  //initIndex, which is the setup menu index, to indcate the options that will change for game
  if (initIndex === 1) {//if equals to 1, which is the number of boxes,
    rect(width / 8 - 10, height / 2 + 40, 70, 70); //draw a red highlight around the option1 box
  } else if (initIndex === 2) {//if equals to 2, which is the pixel of each boxes,
    rect(width / 2 - 10, height / 2 + 40, 70, 70);//draw a red highlight around the option2 box
  }
  fill(255, 255, 255);//colour following shape as rgb white
  //draw the text and box for options
  text("Number of box:", width * 0.17, height * 0.55);
  rect(width / 8, height / 2 + 50, 50, 50);
  
  text("Pixel of each box:", width * 0.55, height * 0.55);
  rect(width / 2, height / 2 + 50, 50, 50);
  
  //show the number that is editing that will be input as setup of game
  fill(85, 91, 110);
  text(size[1], width / 8 + 15, height / 2 + 85);
  text(size[2], width / 2 + 15, height / 2 + 85);

  
//Option Box Logics
  if (keyIsPressed && keyOn) {//if user pressed the key and key is released, to make sure accurate keyboard inputs
    if (keyCode === ENTER) {//and if code is enter
      createChessGround();//create the chessground
      resizeCanvas(size[1] * size[2], size[1] * size[2]);//resize the canvas
      startGame = true;//let the game be true
    } else if (keyCode === 32) {//else if user pressed space
      initIndex++;//increase the initIndex for switching the options in option box
      
      if (initIndex > 2) initIndex = 1;//if index is out of range, set it back to the first one
    } else if (keyCode === 38) {//if key is up,
      size[initIndex]++;//incease the index
    } else if (keyCode === 40) {//else if key is down,
      size[initIndex]--;//decreae the index
      
      if (size[initIndex] < 1) size[initIndex] = 1;//user cannot change the datas less than 1 incase of errors
    } 
    
    keyOn = false;//make keyOn false
  }
}

/**
 * Debug functions, not avalible in defult. To use it please delet the commenting "//" at the bottom of code
 */
function debug() {
  fill(0, 0, 0);
  noStroke();
//setup the ratio of mouse on canvas
  let ratioX = (mouseX / width).toFixed(2);
  let ratioY = (mouseY / height).toFixed(2);

  text(`X:${mouseX} Y:${mouseY} (${ratioX}, ${ratioY})`, mouseX + 10, mouseY - 10);//gives the ratio and pixel on canvas
  circle(mouseX, mouseY, 4); //draw a solid circle for mouse position
  //draw lines for position of mouse
  rect(0, mouseY, width, 1);
  rect(mouseX, 0, 1, height);

  if (keyIsPressed && keyCode === SHIFT) {//if shift is pressed, 
    win = true;//make win true
    console.log("Debug Function: WIN BY EXTERNAL FORCE");
  }
}

/**
 * Function that shows the summary page of who wins
 */
function summary() {
  //draws the background
  background(190, 227, 219);
  noStroke();
  fill(85, 91, 110);
  rect(width / 4, 0, width - width / 2, height);
  fill(250, 249, 249);
  textSize(28);
  textAlign(CENTER);
  //tell who wins
  text("WINNER IS...\n\n*** " + winner.toUpperCase() + "! ***", width / 2, 60);
  textSize(15);
  text("Press 'R' to Restart", width / 2, height - 50);
}
/**
 * Function that reset the game init and setup variables
 */
function resetGame() {
  startGame = false;//set start game as false
  win = false;//set win as false
  winner = "NO WINNER!!!";//set winner as blank 
  preChess = "white";//set prechess as white, which black will go first

  createChessGround();//create the chess ground 
  resizeCanvas(size[1] * size[2], size[1] * size[2]);//and size them by size data
}
/**
 * Main game, that will perform a chess ground, and allows user to click the boxes to place down chess, and store them inside a 2D array
 */
function mainGame() {
  blockWidth = size[2];//set block width as size data
  stroke(1);//stroke for 1 px
  //create the 2D array for chess ground
  for (let y = 0; y < chessGround.length; y++) {//create y axis
    for (let x = 0; x < chessGround[y].length; x++) {//create x axis
      let cell = chessGround[y][x];//let the current position by y,x idk why I make this as y x instead x y when I code this part on april.
      let px = cell.x * blockWidth; // pixel of x
      let py = cell.y * blockWidth; // pixel of y
      
      // DRAW THE BACKGROUND
      if ((x + y) % 2 === 0) {//draw the boxes by a mix pattern. If it is odd;
        fill(255);//fill white colour
      } else {
        fill(213, 176, 124);//fill oak brown colour
      }
      rect(px, py, blockWidth, blockWidth);//draw the rectangle
      
      // if the mouse is inside of a box
      if (mouseX > px && mouseX < px + blockWidth && mouseY > py && mouseY < py + blockWidth) {
        fill(200, 200, 200, 150); // fill guild
        rect(px + 10, py + 10, blockWidth - 20, blockWidth - 20); // show guild
        
        if (mouseIsPressed && mouseReady) { //if mouse is pressed
          if (!cell.party) {//and if that box has no chess init
              //determin which chess will be drawn and set
            if (preChess === "black") {//if it is black before
              cell.party = "white";//define as white
              preChess = "white";//set prechess as white now
            } else {
              cell.party = "black";//define as black
              preChess = "black";//set prechess as black now
            }
            console.log("Location:", cell.x, "-", cell.y, "; Party:", cell.party);//debug; locate the positon of chess begin changed
            mouseReady = false;//mouse ready as false, incase of "long pressed" bug 
            search(cell.x, cell.y);//search if the chess connects as pattern
          }
          
        }
      }

      // DRAW THE CHESS
      if (cell.party === "white") {//if chess is white
        //draw white chess in position of boxes
        drawChess(px + blockWidth / 2, py + blockWidth / 2, size[2] * 3/4, 255);
      } else if (cell.party === "black") {//if chess is black
         //draw black chess in position of boxes
        drawChess(px + blockWidth / 2, py + blockWidth / 2, size[2] * 3/4, 0);
      }
    }
  }

  // SHOW GUILDANCE FOR NEXT CHESS
  if (preChess === "white") {fill(0);} else {fill(255);}//if pre chess is white, when show the guide on mouse position that next chess will be next chess placed
  circle(mouseX, mouseY, d);//draw the guide
}


function draw() {//in the loop;
  background(220);//background as defult grey

  if (!startGame) {//if game is not started
    startTitle();//show start title
  } else if (win) {//if one party has won

    summary();//show summary
  } else {//else
    mainGame();//run the main game
  }
  //debug(); //debug function, defult in-activiate
}

function keyPressed() {//if key pressed 
  if (win && (key === 'r' || key === 'R')) {// If it is showing summary, and key is "r"
    resetGame();//reset game
  }
}
function keyReleased() {//if key is released
  keyOn = true;//key is on
}
function mouseReleased() {//if mouse released
  mouseReady = true;//mouse is ready for next click
}
    </script>
</body>
</html>
